<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 880 640" width="880" height="640" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Serif SC',serif">
  <defs>
    <marker id="sbDown" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#B07D2B"/></marker>
    <marker id="sbUp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#BC4B33"/></marker>
    <marker id="sbLaw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3F7E6B"/></marker>
  </defs>
  <rect x="1" y="1" width="878" height="638" rx="14" fill="#FFFDF8" stroke="rgba(46,41,37,.10)"/>
  <text x="28" y="38" font-size="20" font-weight="700" fill="#2E2925">工程层层分包：不是层层加杠杆，是层层「卸责任」</text>
  <text x="28" y="60" font-size="12.5" fill="#8C8170">向下传的是风险与法律责任（琥珀）；向上累积的是欠款（赤红）；断裂时靠司法把责任归位（绿）。</text>

  <!-- column headers -->
  <text x="240" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#8a5d18">↓ 责任 · 风险 · 资质外壳（层层下卸）</text>
  <text x="610" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#9e3a25">↑ 欠款 · 账期 · 商票（层层上累）</text>

  <!-- chain rows: each a box on the left ladder -->
  <!-- 发包方 -->
  <rect x="150" y="106" width="240" height="46" rx="9" fill="rgba(122,74,85,.10)" stroke="#7A4A55" stroke-width="1.5"/>
  <text x="270" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#7A4A55">建设单位（发包方 · 甲方）</text>
  <text x="270" y="143" text-anchor="middle" font-size="10" fill="#7A4A55">工程款源头 · 最终责任兜底人</text>

  <!-- 总包 -->
  <rect x="150" y="176" width="240" height="46" rx="9" fill="rgba(58,100,145,.10)" stroke="#3A6491" stroke-width="1.5"/>
  <text x="270" y="197" text-anchor="middle" font-size="13" font-weight="700" fill="#2c4d70">施工总承包（持资质 · 中标）</text>
  <text x="270" y="213" text-anchor="middle" font-size="10" fill="#2c4d70">留管理费 · 用商票/账期向下占款</text>

  <!-- 专业分包 -->
  <rect x="168" y="246" width="222" height="42" rx="9" fill="rgba(58,100,145,.07)" stroke="#3A6491" stroke-width="1.3"/>
  <text x="279" y="266" text-anchor="middle" font-size="12" fill="#2c4d70">专业分包 / 劳务分包</text>
  <text x="279" y="281" text-anchor="middle" font-size="9.5" fill="#2c4d70">再抽一手 · 再往下转</text>

  <!-- 挂靠/转包 -->
  <rect x="186" y="312" width="204" height="42" rx="9" fill="rgba(107,79,58,.10)" stroke="#6B4F3A" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="288" y="332" text-anchor="middle" font-size="12" fill="#6B4F3A">挂靠 / 转包（借资质 · 违法）</text>
  <text x="288" y="347" text-anchor="middle" font-size="9.5" fill="#6B4F3A">无资质者借壳承接 · 责任真空</text>

  <!-- 包工头 -->
  <rect x="204" y="378" width="186" height="42" rx="9" fill="rgba(107,79,58,.08)" stroke="#6B4F3A" stroke-width="1.3"/>
  <text x="297" y="398" text-anchor="middle" font-size="12" fill="#6B4F3A">包工头（实际施工人）</text>
  <text x="297" y="413" text-anchor="middle" font-size="9.5" fill="#6B4F3A">带队干活 · 垫资垫工资</text>

  <!-- 农民工 -->
  <rect x="222" y="444" width="168" height="46" rx="9" fill="rgba(188,75,51,.09)" stroke="#BC4B33" stroke-width="1.6"/>
  <text x="306" y="465" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9e3a25">农民工（链条末端）</text>
  <text x="306" y="481" text-anchor="middle" font-size="9.5" fill="#9e3a25">出卖劳动 · 欠薪最终承受者</text>

  <!-- DOWN arrows (responsibility) on left edge -->
  <path d="M150,152 C110,164 110,164 150,176" fill="none" stroke="#B07D2B" stroke-width="2" marker-end="url(#sbDown)"/>
  <path d="M168,222 C128,234 128,234 168,246" fill="none" stroke="#B07D2B" stroke-width="2" marker-end="url(#sbDown)"/>
  <path d="M186,288 C146,300 146,300 186,312" fill="none" stroke="#B07D2B" stroke-width="2" marker-end="url(#sbDown)"/>
  <path d="M204,354 C164,366 164,366 204,378" fill="none" stroke="#B07D2B" stroke-width="2" marker-end="url(#sbDown)"/>
  <path d="M222,420 C182,432 182,432 222,444" fill="none" stroke="#B07D2B" stroke-width="2" marker-end="url(#sbDown)"/>
  <text x="96" y="300" transform="rotate(-90 96 300)" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8a5d18">安全 · 质量 · 用工责任层层下卸</text>

  <!-- UP arrows (debt) on right edge -->
  <path d="M390,466 C440,454 440,220 392,200" fill="none" stroke="#BC4B33" stroke-width="2" marker-end="url(#sbUp)"/>
  <text x="470" y="330" transform="rotate(-90 470 330)" text-anchor="middle" font-size="11.5" font-weight="600" fill="#9e3a25">欠款/工资沿链向上追索</text>

  <!-- 断点 -->
  <text x="300" y="437" text-anchor="middle" font-size="14" font-weight="700" fill="#BC4B33">✕</text>
  <text x="405" y="437" font-size="10" fill="#BC4B33">链断＝欠薪爆发点</text>

  <!-- 右侧：底层逻辑注解 -->
  <rect x="530" y="118" width="322" height="150" rx="10" fill="rgba(63,126,107,.05)" stroke="rgba(63,126,107,.22)"/>
  <text x="546" y="140" font-size="12.5" font-weight="700" fill="#2f5e50">底层逻辑：责任的证券化</text>
  <text x="546" y="162" font-size="11" fill="#5F5648">· 资金端：总包用商票、账期、以票充款向下</text>
  <text x="556" y="177" font-size="11" fill="#5F5648">无息占款，把负债表做轻（同应付账款）。</text>
  <text x="546" y="197" font-size="11" fill="#5F5648">· 责任端：用分包/转包/挂靠把安全、质量、</text>
  <text x="556" y="212" font-size="11" fill="#5F5648">用工的法律责任推到表外的影子承包人。</text>
  <text x="546" y="232" font-size="11" fill="#5F5648">· 结果：风险与责任向下卸、欠款向上累，</text>
  <text x="556" y="247" font-size="11" fill="#5F5648">压在最没议价权的一端——责任真空 + 债权</text>
  <text x="556" y="262" font-size="11" fill="#5F5648">沉底。</text>

  <!-- 右下：司法回补 -->
  <rect x="530" y="286" width="322" height="150" rx="10" fill="rgba(63,126,107,.08)" stroke="rgba(63,126,107,.3)"/>
  <text x="546" y="308" font-size="12.5" font-weight="700" fill="#2f5e50">监管/司法：把被卸掉的责任重新归位</text>
  <text x="546" y="330" font-size="11" fill="#5F5648">· 实际施工人可突破合同相对性，在发包人</text>
  <text x="556" y="345" font-size="11" fill="#5F5648">欠付工程款范围内直接向其追索（司解一 43 条）。</text>
  <text x="546" y="365" font-size="11" fill="#5F5648">· 《保障农民工工资支付条例》(2020)：工资</text>
  <text x="556" y="380" font-size="11" fill="#5F5648">专用账户、总包代发、实名制、欠薪连带。</text>
  <text x="546" y="400" font-size="11" fill="#5F5648">· 本质：法律强行刺穿分包链，把「合同相对</text>
  <text x="556" y="415" font-size="11" fill="#5F5648">性」这层防火墙击穿，让责任回到发包人。</text>
  <text x="546" y="430" font-size="10.5" fill="#8C8170">（与恒大「防火墙被清盘人穿透」同构。）</text>

  <!-- 与全景图对照 -->
  <path d="M546,336 C500,360 470,420 392,462" fill="none" stroke="#3F7E6B" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#sbLaw)"/>

  <!-- 底部一句 -->
  <rect x="36" y="516" width="808" height="98" rx="10" fill="rgba(176,125,43,.06)" stroke="rgba(176,125,43,.28)"/>
  <text x="52" y="540" font-size="12.5" fill="#5F5648"><tspan font-weight="700" fill="#8a5d18">一句话：</tspan>其它节点是「我的负债＝你的资产」地把信用做大；这条链是「我的责任＝你的责任」地把风险卸出——</text>
  <text x="52" y="560" font-size="12.5" fill="#5F5648">用产业组织（分包合同 + 资质出借）实现「责任出表」，与用金融工具（TRS/表外/信托）实现「负债出表」，是同一动作的两副面孔。</text>
  <text x="52" y="582" font-size="12" fill="#5F5648">反身性不高（不靠价格自我强化），但脆弱在<tspan font-weight="600" fill="#9e3a25">责任真空</tspan>：出事时人人都是「上一层的问题」，直到司法强行归位。</text>
  <text x="52" y="602" font-size="11.5" fill="#8C8170">在全景图中位于「公司」列，与应付账款、商票相邻——同属核心企业对上下游的无息占款，但它多卸了一层「法律责任」。</text>
</svg>
